dataset: "jesc-split"
run_name: "enc-dec"
learning_rate: 0.0001
batch_size: 256
# For the EncoderDecoder these dims size BOTH the encoder and decoder stacks.
dec_n_layer: 6
dec_n_embd: 1024
dec_n_head: 4
log_interval: 100
save_checkpoint: True
checkpoint_dir: "checkpoints"
max_epochs: 5
checkpoint_interval: 10000
val_max_samples: 500
val_max_new_tokens: 128
