#====================Training Script Config====================#
dataset: "wmt14-de-en"
run_name: "enc-dec-mini"
max_epochs: 1
learning_rate: 0.005
batch_size: 1
log_interval: 100
save_checkpoint: True
checkpoint_dir: "checkpoints"
num_workers: 4
beta1: 0.9
beta2: 0.95
weight_decay: 0.01

#====================Model Config====================#
hidden_pdrop: 0.1
attn_pdrop: 0.1
grad_norm_clip: 1.0

n_layer: 1
n_embd: 8
n_head: 1