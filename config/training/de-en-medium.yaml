#====================Training Script Config====================#
dataset: "wmt14-de-en"
run_name: "de-en-medium"
max_epochs: 5
learning_rate: 0.0001
batch_size: 256
log_interval: 100
save_checkpoint: True
checkpoint_dir: "checkpoints"
num_workers: 4
compile: True
beta1: 0.9
beta2: 0.95
weight_decay: 0.01
warmup_iters: 1

#====================Model Config====================#
hidden_pdrop: 0.1
attn_pdrop: 0.1
grad_norm_clip: 1.0

n_layer: 8
n_embd: 512
n_head: 8