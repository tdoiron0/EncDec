AWSTemplateFormatVersion: '2010-09-09'

# Present only to supply ImageId without hardcoding a region-specific AMI ID.
# Delete this block and set ImageId to a literal ami-xxxx to go even leaner
# (but then the template only works in that one region).
Parameters:
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/26.04/stable/current/amd64/hvm/ebs-gp3/ami-id # Ubuntu Server latest version

Resources:
  Ec2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId 
      InstanceType: t3.micro